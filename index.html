const makeDB=(url,key)=>{
  const h=(tok,x={})=>({apikey:key,"Content-Type":"application/json",...(tok?{Authorization:`Bearer ${tok}`}:{}), ...x});
  const q=t=>({
    select:(c="*",tok,qs="")=>fetch(`${url}/rest/v1/${t}?select=${c}${qs}`,{headers:h(tok,{Prefer:"return=representation"})}).then(r=>r.json()),
    insert:(d,tok)=>fetch(`${url}/rest/v1/${t}`,{method:"POST",headers:h(tok,{Prefer:"return=representation"}),body:JSON.stringify(d)}).then(r=>r.json()),
    update:(d,tok,qs)=>fetch(`${url}/rest/v1/${t}?${qs}`,{method:"PATCH",headers:h(tok,{Prefer:"return=representation"}),body:JSON.stringify(d)}).then(r=>r.json()),
    del:(tok,qs)=>fetch(`${url}/rest/v1/${t}?${qs}`,{method:"DELETE",headers:h(tok)}).then(r=>r.ok),
  });
  return{
    auth:{
      signUp:(e,p,n)=>fetch(`${url}/auth/v1/signup`,{method:"POST",headers:h(null),body:JSON.stringify({email:e,password:p,data:{name:n}})}).then(r=>r.json()),
      signIn:(e,p)=>fetch(`${url}/auth/v1/token?grant_type=password`,{method:"POST",headers:h(null),body:JSON.stringify({email:e,password:p})}).then(r=>r.json()),
      signOut:(tok)=>fetch(`${url}/auth/v1/logout`,{method:"POST",headers:h(tok)}),
    },
    from:q,
  };
};

const callAI=async(prompt,apiKey)=>{
  if(!apiKey)throw new Error("No Groq API key — add it in Setup");
  let resp;
  try{resp=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey.trim()}`},body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,temperature:0.5,messages:[{role:"user",content:prompt}]})});}
  catch(e){throw new Error("Network error: "+e.message);}
  const d=await resp.json();
  if(!resp.ok||d.error){
    const code=d.error?.code||resp.status;const msg=d.error?.message||"Unknown";
    if(code===429||code==="rate_limit_exceeded")throw new Error("Rate limit — wait a moment and retry");
    if(code===401||code==="invalid_api_key")throw new Error("Invalid Groq API key — check at console.groq.com/keys");
    throw new Error("Groq error: "+msg);
  }
  if(!d.choices?.length)throw new Error("Groq returned empty response");
  return d.choices[0].message?.content||"";
};
const extractJSON=raw=>{
  const s=raw.replace(/```json/gi,"").replace(/```/g,"").trim();
  try{return JSON.parse(s);}catch(e){}
  const a=s.indexOf("{"),b=s.lastIndexOf("}");
  if(a!==-1&&b>a){try{return JSON.parse(s.slice(a,b+1));}catch(e){}}
  throw new Error("Could not parse JSON from AI");
};

const compressImage=(file,maxW=1200,quality=0.75)=>new Promise(resolve=>{
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const ratio=Math.min(1,maxW/img.width);
    const canvas=document.createElement("canvas");
    canvas.width=Math.round(img.width*ratio);
    canvas.height=Math.round(img.height*ratio);
    canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    resolve(canvas.toDataURL("image/jpeg",quality));
  };
  img.src=url;
});

const downloadImage=(dataUrl,filename="apex-photo.jpg")=>{
  const a=document.createElement("a");a.href=dataUrl;a.download=filename;a.click();
};
const downloadCSV=(data,filename)=>{
  if(!data.length)return;
  const keys=Object.keys(data[0]);
  const csv=[keys.join(","),...data.map(r=>keys.map(k=>JSON.stringify(r[k]||"")).join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=filename;a.click();
};
const downloadXLSX=(sheets,filename)=>{
  if(typeof XLSX==="undefined"){alert("XLSX library not loaded");return;}
  const wb=XLSX.utils.book_new();
  sheets.forEach(({name,data})=>{XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),name);});
  XLSX.writeFile(wb,filename);
};
const downloadPDF=(title,sections)=>{
  const win=window.open("","_blank");
  const body=sections.map(({heading,rows,cols})=>`<h2>${heading}</h2><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`).join("");
  win.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>body{font-family:Arial,sans-serif;padding:30px;color:#1a1a2e}h1{color:#00E87A;font-size:26px}h2{color:#333;font-size:16px;margin:20px 0 8px;border-bottom:2px solid #00E87A;padding-bottom:4px}table{width:100%;border-collapse:collapse;margin:8px 0}th{background:#00E87A;color:#fff;padding:7px 10px;font-size:11px;text-align:left}td{padding:7px 10px;border-bottom:1px solid #eee;font-size:11px}@media print{body{padding:10px}}</style></head><body><h1>⚡ APEX AI — ${title}</h1><p style="color:#888;font-size:12px">Exported ${new Date().toLocaleDateString()}</p>${body}</body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),400);

const shareText=(platform,text)=>{
  const enc=encodeURIComponent(text);
  const urls={whatsapp:`https://wa.me/?text=${enc}`,twitter:`https://twitter.com/intent/tweet?text=${enc}`,facebook:`https://www.facebook.com/sharer/sharer.php?quote=${enc}`,telegram:`https://t.me/share/url?url=https://apexfitness.app&text=${enc}`};
  if(urls[platform]){window.open(urls[platform],"_blank");return;}
  navigator.clipboard?.writeText(text).then(()=>alert(`✅ Copied! Now open ${platform} and paste in your story/post.`));
};
const shareImageToSocial=async(platform,dataUrl,caption="")=>{
  if(platform==="native"&&navigator.share){
    try{const res=await fetch(dataUrl);const blob=await res.blob();const file=new File([blob],"apex-progress.jpg",{type:"image/jpeg"});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"APEX AI Progress",text:caption||"My fitness progress with APEX AI 💪"});return;}}catch(e){}
  }
  if(platform==="instagram"||platform==="snapchat"){downloadImage(dataUrl,`apex-${platform}-photo.jpg`);setTimeout(()=>alert(`📥 Photo downloaded!\n\nNow open ${platform==="instagram"?"Instagram":"Snapchat"} → create a Story or Post → choose from your gallery.`),300);return;}
  shareText(platform,caption||"My fitness progress 💪 #APEXAI #fitness");
};
const shareReport=(platform,stats)=>{

};

function AuthScreen({db,onAuth}){
  const[mode,setMode]=useState("login");
  const[name,setName]=useState("");const[email,setEmail]=useState("");const[pw,setPw]=useState("");
  const[goal,setGoal]=useState("Build Muscle");const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");const[info,setInfo]=useState("");
  const GOALS=["Build Muscle","Lose Fat","Calisthenics Skills","Strength & Power","General Fitness"];
  const submit=async()=>{
    if(!email.trim()||!pw.trim()){setErr("Enter email and password.");return;}
    if(mode==="signup"&&!name.trim()){setErr("Name required.");return;}
    if(pw.length<6){setErr("Password must be 6+ characters.");return;}
    setLoading(true);setErr("");setInfo("");
    try{
      if(mode==="signup"){
        const r=await db.auth.signUp(email.trim(),pw,name.trim());
        if(r.error){setErr(r.error.message);return;}
        if(!r.session&&!r.access_token){setInfo("✅ Check email for confirmation, then Sign In.");setMode("login");setLoading(false);return;}
        const tok=r.access_token||r.session?.access_token;const usr=r.user||r.session?.user;
        if(usr&&tok){await db.from("profiles").update({goal,name:name.trim()},tok,`id=eq.${usr.id}`);onAuth(usr,tok,name.trim(),goal,{},r.refresh_token||r.session?.refresh_token);}
        else{setInfo("✅ Confirmed! Sign In.");setMode("login");}
      }else{
        const r=await db.auth.signIn(email.trim(),pw);
        if(r.error){const m=r.error.message||"";if(m.includes("Invalid login"))setErr("Wrong email or password.");else if(m.includes("Email not confirmed"))setErr("Confirm email first.");else setErr(m||"Sign in failed.");return;}
        const tok=r.access_token;const usr=r.user;
        if(!tok||!usr){setErr("Unexpected response.");return;}
        const p=await db.from("profiles").select("*",tok,`&id=eq.${usr.id}`);
        onAuth(usr,tok,p?.[0]?.name||email,p?.[0]?.goal||"Build Muscle",p?.[0]||{},r.refresh_token);
      }
    }catch(e){setErr("Network error — check internet and Supabase.");}

          </div>
          <p style={{color:C.t2,fontSize:12}}>{mode==="signup"?"Create your athlete profile":"Welcome back, athlete"}</p>
        </div>
        <div style={{display:"flex",background:C.surface,borderRadius:10,padding:3,marginBottom:16,border:`1px solid ${C.border}`}}>
          {["login","signup"].map(m=>(<button key={m} onClick={()=>{setMode(m);setErr("");setInfo("");}} style={{flex:1,padding:"8px",borderRadius:8,background:mode===m?C.accent:"transparent",color:mode===m?C.bg:C.t2,fontWeight:700,fontSize:12,border:"none",cursor:"pointer",transition:"all .2s"}}>{m==="login"?"Sign In":"Sign Up"}</button>))}
        </div>

        <Card>

function StreakCalendar({logs}){
  const workoutDates=useMemo(()=>new Set(logs.map(l=>l.completed_at?.split("T")[0])),[logs]);
  const intensityMap=useMemo(()=>{const m={};logs.forEach(l=>{const d=l.completed_at?.split("T")[0];if(d)m[d]=l.intensity||"moderate";});return m;},[logs]);
  const today=new Date();const start=new Date(today);start.setDate(today.getDate()-27);
  while(start.getDay()!==0)start.setDate(start.getDate()-1);
  const weeks=[];let day=new Date(start);
  for(let w=0;w<5;w++){const wk=[];for(let d=0;d<7;d++){wk.push(new Date(day));day.setDate(day.getDate()+1);}weeks.push(wk);}
  const getColor=date=>{const ds=date.toISOString().split("T")[0];const isToday=date.toDateString()===today.toDateString();const isSun=date.getDay()===0;const has=workoutDates.has(ds);const intens=intensityMap[ds];
    if(isSun)return{bg:C.surface,border:C.border};
    if(has){if(intens==="heavy")return{bg:C.orange+"40",border:C.orange};if(intens==="light")return{bg:C.accent+"25",border:C.accent+"60"};return{bg:C.blue+"30",border:C.blue};}
    if(isToday)return{bg:C.accentD,border:C.accent+"60"};if(date<today)return{bg:C.surface,border:C.border};return{bg:"transparent",border:C.border+"40"};};
  return(<Card sx={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <p style={{fontWeight:800,fontSize:13}}>Training Calendar</p>

  const uniqueDays=arr=>[...new Set(arr.map(l=>(l.logged_at||l.completed_at)?.split("T")[0]))].length||1;
  const totalVol=Math.round(wLogs.reduce((a,l)=>a+(l.total_volume||0),0));const totalMin=wLogs.reduce((a,l)=>a+(l.duration_min||0),0);const totalCal=nLogs.reduce((a,l)=>a+(l.calories||0),0);const avgCal=nLogs.length?Math.round(totalCal/uniqueDays(nLogs)):0;

  const bwChart=bwLogs.slice(0,10).reverse();const bwMax=Math.max(...bwChart.map(b=>+b.weight_kg),1);const bwMin=Math.min(...bwChart.map(b=>+b.weight_kg),bwMax);

function AICoachScreen({user,profile,wLogs,aiKey}){

  const save=async()=>{setLoading(true);await db.from("profiles").update({name,weight_kg:weight?+weight:null,height_cm:height?+height:null,goal,calorie_goal:+calGoal||2000,water_goal_ml:+waterGoal||2500},token,`id=eq.${user.id}`);setLoading(false);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const bmi=weight&&height?(weight/((height/100)**2)).toFixed(1):null;
  return(<Modal title="Profile" onClose={onClose}><div style={{textAlign:"center",marginBottom:16}}><div style={{width:64,height:64,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:24,color:C.bg,margin:"0 auto 8px"}}>{(name||user?.email||"A").substring(0,2).toUpperCase()}</div><div style={{fontWeight:800,fontSize:15}}>{name||"Athlete"}</div><div style={{color:C.t2,fontSize:11,marginBottom:6}}>{user?.email}</div>{bmi&&<div style={{display:"flex",justifyContent:"center",gap:14}}>{[["⚖️",weight+"kg"],["📏",height+"cm"],["BMI",bmi]].map(([i,v])=><div key={v} style={{textAlign:"center"}}><div style={{fontSize:14,marginBottom:1}}>{i}</div><div style={{fontFamily:"'DM Mono'",fontSize:12,fontWeight:700}}>{v}</div></div>)}</div>}{saved&&<div className="pi" style={{marginTop:7,background:C.accentD,border:`1px solid ${C.accent}30`,borderRadius:7,padding:"4px 12px",color:C.accent,fontSize:11,fontWeight:700,display:"inline-block"}}>✓ Saved!</div>}</div>
  <div style={{display:"flex",flexDirection:"column",gap:10}}><Inp label="Name" value={name} onChange={setName} placeholder="Your name"/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Inp label="Weight (kg)" type="number" value={String(weight)} onChange={setWeight} placeholder="80"/><Inp label="Height (cm)" type="number" value={String(height)} onChange={setHeight} placeholder="180"/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Inp label="Calorie Goal" type="number" value={String(calGoal)} onChange={setCalGoal} placeholder="2000"/><Inp label="Water Goal (ml)" type="number" value={String(waterGoal)} onChange={setWaterGoal} placeholder="2500"/></div><div><label style={{fontSize:11,color:C.t2,fontWeight:700,letterSpacing:.7,textTransform:"uppercase",display:"block",marginBottom:6}}>Goal</label><div style={{display:"flex",flexDirection:"column",gap:6}}>{GOALS.map(g=><button key={g} onClick={()=>setGoal(g)} style={{padding:"8px 12px",borderRadius:8,background:goal===g?C.accentD:C.surface,border:`1.5px solid ${goal===g?C.accent:C.border}`,color:goal===g?C.accent:C.t2,fontWeight:700,fontSize:11,cursor:"pointer",textAlign:"left"}}>{goal===g?"✓ ":""}{g}</button>)}</div></div><Btn onClick={save} full loading={loading}>Save Changes</Btn><Btn onClick={onSignOut} outline full color={C.red}>Sign Out</Btn></div></Modal>);
}
const SS_KEY="apex_session_v4";const CFG_KEY="apexcfg_v4";
const saveSession=(cfg,auth)=>{try{localStorage.setItem(CFG_KEY,JSON.stringify(cfg));localStorage.setItem(SS_KEY,JSON.stringify({user:auth.user,token:auth.token,refreshToken:auth.refreshToken||null,name:auth.name,goal:auth.goal,profile:auth.profile,savedAt:Date.now()}));}catch(e){}};
const loadSession=()=>{try{const cfg=JSON.parse(localStorage.getItem(CFG_KEY)||"null");const ss=JSON.parse(localStorage.getItem(SS_KEY)||"null");return{cfg,ss};}catch{return{cfg:null,ss:null};}};
const clearSession=()=>{try{localStorage.removeItem(CFG_KEY);localStorage.removeItem(SS_KEY);}catch(e){}};
const TOKEN_TTL=50*60*1000;

function App(){
  const init=loadSession();
  const[config,setConfig]=useState(init.cfg);const[db,setDb]=useState(()=>init.cfg?makeDB(init.cfg.url,init.cfg.key):null);const[auth,setAuth]=useState(null);const[restoring,setRestoring]=useState(!!init.ss);const[screen,setScreen]=useState("home");const[activeWorkout,setActiveWorkout]=useState(null);const[showProfile,setShowProfile]=useState(false);const[recentLogs,setRecentLogs]=useState([]);
  useEffect(()=>{
    const{cfg,ss}=init;if(!cfg||!ss){setRestoring(false);return;}
    const dbInst=makeDB(cfg.url,cfg.key);const age=Date.now()-(ss.savedAt||0);
    if(age<TOKEN_TTL){setDb(dbInst);setAuth({user:ss.user,token:ss.token,name:ss.name,goal:ss.goal,profile:ss.profile||{}});setRestoring(false);dbInst.from("profiles").select("*",ss.token,`&id=eq.${ss.user.id}`).then(p=>{if(Array.isArray(p)&&p.length)setAuth(a=>({...a,profile:p[0]||a.profile}));}).catch(()=>{});}
    else{const refreshToken=ss.refreshToken;if(refreshToken){fetch(`${cfg.url}/auth/v1/token?grant_type=refresh_token`,{method:"POST",headers:{apikey:cfg.key,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:refreshToken})}).then(r=>r.json()).then(async r=>{if(r.access_token&&r.user){const newTok=r.access_token;const p=await dbInst.from("profiles").select("*",newTok,`&id=eq.${r.user.id}`);const profile=Array.isArray(p)?p[0]||{}:{};const newAuth={user:r.user,token:newTok,refreshToken:r.refresh_token||refreshToken,name:profile.name||ss.name,goal:profile.goal||ss.goal,profile};saveSession(cfg,newAuth);setDb(dbInst);setAuth(newAuth);}else{clearSession();setConfig(null);setDb(null);}setRestoring(false);}).catch(()=>{clearSession();setConfig(null);setDb(null);setRestoring(false);});}else{setDb(dbInst);setAuth({user:ss.user,token:ss.token,name:ss.name,goal:ss.goal,profile:ss.profile||{}});setRestoring(false);}}
  },[]);
  const connect=(url,key,aiKey)=>{const cfg={url,key,aiKey};setDb(makeDB(url,key));setConfig(cfg);localStorage.setItem(CFG_KEY,JSON.stringify(cfg));};
  const handleAuth=(user,token,name,goal,profile,refreshToken)=>{const newAuth={user,token,refreshToken:refreshToken||null,name,goal,profile:profile||{}};setAuth(newAuth);saveSession({url:config?.url||"",key:config?.key||""},newAuth);};
  const handleSignOut=async()=>{if(db&&auth)try{await db.auth.signOut(auth.token);}catch(e){}setAuth(null);clearSession();setConfig(null);setDb(null);};
  const loadLogs=useCallback(async()=>{if(!db||!auth)return;try{const l=await db.from("workout_logs").select("*",auth.token,`&user_id=eq.${auth.user.id}&order=completed_at.desc&limit=5`);setRecentLogs(Array.isArray(l)?l:[]);}catch(e){}},[db,auth]);
  useEffect(()=>{loadLogs();},[loadLogs]);
  const finishWorkout=()=>{setActiveWorkout(null);setScreen("reports");loadLogs();};
  if(restoring)return(<div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,gap:16}}><div style={{width:52,height:52,background:C.accent,borderRadius:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>⚡</div><Spin s={22}/><p style={{color:C.t2,fontSize:12}}>Restoring your session...</p></div>);
  return(<div style={{height:"100vh",position:"relative",maxWidth:480,margin:"0 auto",overflow:"hidden",background:C.bg}}>
    {!config&&<SetupScreen onConnect={connect}/>}
    {config&&!auth&&<AuthScreen db={db} onAuth={handleAuth}/>}
    {config&&auth&&<>
      <button onClick={()=>setShowProfile(true)} style={{position:"fixed",top:12,right:16,zIndex:150,width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.blue})`,border:`2px solid ${C.bg}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,color:C.bg}}>{(auth.profile?.name||auth.name||"A").substring(0,2).toUpperCase()}</button>
      {screen==="home"&&<HomeScreen db={db} user={auth.user} token={auth.token} profile={auth.profile} onNav={setScreen} onStartWorkout={setActiveWorkout} aiKey={config?.aiKey}/>}
      {screen==="workout"&&<WorkoutScreen db={db} user={auth.user} token={auth.token} onStartWorkout={setActiveWorkout} aiKey={config?.aiKey}/>}
      {screen==="nutrition"&&<NutritionScreen db={db} user={auth.user} token={auth.token} aiKey={config?.aiKey}/>}
      {screen==="photos"&&<PhotosScreen db={db} user={auth.user} token={auth.token}/>}
      {screen==="reports"&&<ReportsScreen db={db} user={auth.user} token={auth.token}/>}
      {screen==="ai"&&<AICoachScreen user={auth.user} profile={auth.profile} wLogs={recentLogs} aiKey={config?.aiKey}/>}
      <BottomNav active={screen} onNav={setScreen}/>
      {activeWorkout&&<ActiveWorkout db={db} user={auth.user} token={auth.token} workout={activeWorkout} onFinish={finishWorkout}/>}
      {showProfile&&<ProfileModal db={db} user={auth.user} token={auth.token} profile={auth.profile} onClose={()=>setShowProfile(false)} onSignOut={handleSignOut}/>}
    </>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
